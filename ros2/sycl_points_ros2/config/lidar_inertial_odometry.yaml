lidar_inertial_odometry_node:
  ros__parameters:
    sycl/device_type: gpu      # gpu, cpu
    sycl/device_vendor: intel  # intel, nvidia, amd, omp(for AdaptiveCpp CPU backend)

    points_topic: points
    imu_topic: imu/data

    # QoS settings for subscriptions
    # history:      "keep_last" (queue up to depth messages) or "keep_all".
    #               If using intraprocess communication, set to keep_last.
    # depth:        queue depth used only when history == "keep_last" (ignored for "keep_all")
    # reliability:  "best_effort" or "reliable"
    points_qos/history: "keep_last"
    points_qos/depth: 10
    points_qos/reliability: "best_effort"
    imu_qos/history: "keep_last"
    imu_qos/depth: 100
    imu_qos/reliability: "best_effort"

    odom_frame_id: odom
    base_link_id: base_link
    lidar_frame_id: os_sensor
    rviz2: true
    use_sim_time: false

    initial_base_link_pose/x: 0.0
    initial_base_link_pose/y: 0.0
    initial_base_link_pose/z: 0.0
    initial_base_link_pose/qx: 0.0
    initial_base_link_pose/qy: 0.0
    initial_base_link_pose/qz: 0.0
    initial_base_link_pose/qw: 1.0

    T_base_link_to_lidar/x: 0.0
    T_base_link_to_lidar/y: 0.0
    T_base_link_to_lidar/z: 0.0
    T_base_link_to_lidar/qx: 0.0
    T_base_link_to_lidar/qy: 0.0
    T_base_link_to_lidar/qz: 0.0
    T_base_link_to_lidar/qw: 1.0

    T_imu_to_lidar/x: 0.0
    T_imu_to_lidar/y: 0.0
    T_imu_to_lidar/z: 0.0
    T_imu_to_lidar/qx: 0.0
    T_imu_to_lidar/qy: 0.0
    T_imu_to_lidar/qz: 0.0
    T_imu_to_lidar/qw: 1.0

    # IMU (always enabled for LIO)
    imu/accel_unit: "m_s2"              # IMU acceleration unit: "m_s2" (m/s^2) or "G" (1G = 9.80665 m/s^2). Use "G" for Livox built-in IMU.
    imu/buffer_duration_sec: 1.0        # IMU buffering duration
    imu/deskew/enable: true             # IMU-based pre-processing deskew
    imu/preintegration/gravity/x: 0.0   # Gravity vector in world frame [m/s^2]
    imu/preintegration/gravity/y: 0.0
    imu/preintegration/gravity/z: -9.80665

    # IMU noise densities for 15x15 covariance propagation.
    # Set non-zero to enable covariance propagation (required for IMU prior weighting).
    imu/preintegration/gyro_noise_density: 1.0e-2    # rad/s/sqrt(Hz)
    imu/preintegration/accel_noise_density: 1.0e-3   # m/s^2/sqrt(Hz)
    imu/preintegration/gyro_bias_rw_density: 1.0e-5  # rad/s^2/sqrt(Hz)
    imu/preintegration/accel_bias_rw_density: 1.0e-4 # m/s^3/sqrt(Hz)

    imu/bias/gyro/x: 0.0  # Initial gyroscope bias [rad/s]
    imu/bias/gyro/y: 0.0
    imu/bias/gyro/z: 0.0
    imu/bias/accel/x: 0.0  # Initial accelerometer bias [m/s^2]
    imu/bias/accel/y: 0.0
    imu/bias/accel/z: 0.0

    # Gravity-aligned initial roll/pitch estimation.
    # Assumes the robot is stationary for at least required_duration_sec at startup.
    # Yaw is preserved from initial_base_link_pose; gravity does not constrain it.
    # The first few scans before alignment converges are dropped (waiting_initial_alignment).
    imu/initial_alignment/enable: true
    imu/initial_alignment/required_duration_sec: 0.2  # IMU window length [s]; must be <= imu/buffer_duration_sec
    imu/initial_alignment/max_gyro_std: 0.05          # [rad/s] per-axis stationarity threshold
    imu/initial_alignment/max_accel_std: 0.2          # [m/s^2] per-axis stationarity threshold
    imu/initial_alignment/max_accel_norm_error: 0.5   # [m/s^2] tolerance on |a_mean| vs |gravity|
    imu/initial_alignment/estimate_gyro_bias: true    # Replace gyro bias with the stationary mean
    imu/initial_alignment/max_wait_sec: 5.0           # Force alignment after this many seconds even if not stationary (<=0 = wait forever)

    # Select whether additional point attributes are copied from input PointCloud2.
    input/convert_rgb: true
    input/convert_intensity: false
    input/use_reflectivity_as_intensity: false

    # Scan PointCloud preprocessing
    scan/preprocess/box_filter/enable: true
    scan/preprocess/box_filter/max: 100.0
    scan/preprocess/box_filter/min: 0.4
    scan/preprocess/angle_incidence_filter/enable: false
    scan/preprocess/angle_incidence_filter/min_angle: 0.0
    scan/preprocess/angle_incidence_filter/max_angle: 1.396  # 80 degrees

    # [Ouster LiDAR] Enhanced intensity correction using intensity, ambient, and ring fields.
    # Applies range compensation, ambient light merging, and per-ring normalization to remove
    # horizontal banding.
    scan/enhanced_reflectivity/enable: false
    scan/enhanced_reflectivity/clip_max: 5.0
    scan/enhanced_reflectivity/ring_mean_ema_alpha: 0.5  # EMA factor for per-ring mean smoothing (0=frozen, 1=no smoothing)

    # Generic distance/angle-based intensity correction.
    scan/intensity_correction/enable: false
    scan/intensity_correction/exp: 2.0
    scan/intensity_correction/scale: 1.0e-4
    scan/intensity_correction/min_intensity: 0.0
    scan/intensity_correction/max_intensity: 100.0
    scan/intensity_correction/ref_distance: 1.0
    scan/intensity_correction/angle_exponent: 0.0  # 0: disabled, 1.0: Lambertian reflectance

    scan/intensity_gaussian/enable: false
    scan/intensity_gaussian/neighbor_num: 10
    scan/intensity_gaussian/sigma_azimuth: 0.3    # [m] horizontal (azimuthal) scan direction
    scan/intensity_gaussian/sigma_elevation: 0.5  # [m] vertical (elevation) direction
    scan/intensity_gaussian/sigma_range: 0.05     # [m] radial depth direction (small = edge-preserving)

    scan/intensity_local_mean_norm/enable: false
    scan/intensity_local_mean_norm/neighbor_num: 10
    scan/intensity_local_mean_norm/sigma_azimuth: 0.3    # [m] horizontal (azimuthal) scan direction
    scan/intensity_local_mean_norm/sigma_elevation: 0.5  # [m] vertical (elevation) direction
    scan/intensity_local_mean_norm/sigma_range: 0.05     # [m] radial depth direction (small = edge-preserving)
    scan/intensity_local_mean_norm/mean_min: 0.001       # minimum local mean below which normalization is skipped

    scan/downsampling/voxel/enable: false
    scan/downsampling/voxel/voxel_size: 0.3
    scan/downsampling/polar/enable: true
    scan/downsampling/polar/distance_size: 0.5 # meters
    scan/downsampling/polar/elevation_size: 0.017453292519943295 # 1 degrees
    scan/downsampling/polar/azimuth_size: 0.017453292519943295   # 1 degrees
    scan/downsampling/polar/coord_system: LIDAR # CAMERA or LIDAR
    scan/downsampling/random/enable: false
    scan/downsampling/random/num: 4096

    # Covariance estimator
    covariance_estimation/neighbor_num: 15
    covariance_estimation/m_estimation/enable: false # EXPERIMENTAL
    covariance_estimation/m_estimation/type: GEMAN_MCCLURE # HUBER, TUKEY, CAUCHY, GEMAN_MCCLURE
    covariance_estimation/m_estimation/mad_scale: 2.0
    covariance_estimation/m_estimation/min_robust_scale: 5.0
    covariance_estimation/m_estimation/max_iterations: 1

    # PointCloud Submapping
    submap/voxel_size: 0.4
    submap/max_distance_range: 50.0
    submap/point_random_sampling_num: 512
    submap/weighted_sampling_ratio: 0.8
    submap/map_type: OCCUPANCY_GRID_MAP # OCCUPANCY_GRID_MAP, VOXEL_HASH_MAP
    submap/keyframe/inlier_ratio_threshold: 0.3
    submap/keyframe/distance_threshold: 2.0
    submap/keyframe/angle_threshold_degrees: 20.0
    submap/keyframe/time_threshold_seconds: 1.0
    submap/occupancy_grid_map/log_odds_hit: 0.5
    submap/occupancy_grid_map/log_odds_miss: -0.03
    submap/occupancy_grid_map/log_odds_limits/min: -10.0
    submap/occupancy_grid_map/log_odds_limits/max: 10.0
    submap/occupancy_grid_map/occupied_threshold: 0.5
    submap/occupancy_grid_map/enable_free_space_update: true
    submap/occupancy_grid_map/enable_pruning: true
    submap/occupancy_grid_map/stale_frame_threshold: 600

    # LIO optimization (Gauss-Newton combining ICP + IMU Hessians)
    # Total IEKF iterations per frame: each iteration = one linearize+solve,
    # with the robust scale annealed across these iterations (flat loop).
    lio/total_iterations: 8
    lio/criteria/translation: 0.01  # [m]
    lio/criteria/rotation: 0.01     # [rad]
    lio/invalid_regularization_factor: 1.0e+4
    # Fixed-sigma floors added to P_initial at each IMU reset.
    # Prevents H_imu from dominating H_icp when noise_density is set to a small
    # physical value (accel / gyro).
    # fd_velocity_sigma: σ_v [m/s]  → P_pred[p,p] ≳ (σ_v × dt)²  ≈ σ_icp²
    #   rule of thumb: σ_icp / dt  (e.g. 0.01 m / 0.1 s = 0.1 m/s)
    lio/fd_velocity_sigma: 0.1    # [m/s]
    # icp_rotation_sigma: σ_rot [rad]  → P_pred[φ,φ] ≳ σ_rot²
    #   choose so 1/σ_rot² ≲ H_icp[rot,rot]  (≈ 1e4–1e5 → σ ≈ 0.003–0.01 rad)
    lio/icp_rotation_sigma: 0.01  # [rad]
    # Post-optimization velocity blend in [0,1]:
    #   v = (1 - blend) * v_filter + blend * v_finite_difference
    # 0.0 trusts the smooth IEKF filter velocity (less position-noise leakage into
    # the next window's IMU prior); 1.0 is the legacy pure finite-difference estimate.
    lio/velocity_fd_blend: 0.5
    # Bias-estimation safeguards for the weakly-observable IMU bias states.
    # freeze_on_low_excitation: hold accel/gyro bias fixed when the IMU window shows
    #   little motion (biases are unobservable there and would absorb noise).
    lio/bias_estimation/freeze_on_low_excitation: true
    lio/bias_estimation/gyro_excitation_threshold: 0.03   # [rad/s] max |w - mean w| in window
    lio/bias_estimation/accel_excitation_threshold: 0.3   # [m/s^2] max ||a| - mean |a|| in window
    # Hard clamp on estimated bias L2 norm (0 = disabled). Bounds runaway/drift.
    lio/bias_estimation/max_accel_bias: 1.0   # [m/s^2]
    lio/bias_estimation/max_gyro_bias: 0.2    # [rad/s]

    # ICP registration backend (used for linearization inside the LIO loop)
    # registration/solver_iterations is unused; the loop count is lio/total_iterations.
    registration/type: gicp # point_to_point, point_to_plane, point_to_distribution, gicp, genz
    registration/min_num_points: 300
    registration/random_sampling/enable: true
    registration/random_sampling/num: 2048
    # Intensity-weighted sampling. Assumes intensities are pre-normalized (e.g. by scan/intensity_local_mean_norm).
    # Silently falls back to uniform sampling when the source has no intensity field.
    registration/random_sampling/use_intensities: false
    registration/random_sampling/weighted_ratio: 0.8  # Fraction of samples from the weighted distribution [0.0, 1.0]
    registration/max_correspondence_distance: 2.0

    registration/robust/type: GEMAN_MCCLURE # NONE, HUBER, TUKEY, CAUCHY, GEMAN_MCCLURE
    registration/robust/default_scale: 10.0
    registration/robust/auto_scale: true
    registration/robust/auto_scaling_iter: 4
    registration/robust/init_scale: 10.0
    registration/robust/min_scale: 1.25

    registration/rotation_constraint/enable:
      true # Jensen-Bregman LogDet Divergence. EXPERIMENTAL
    registration/rotation_constraint/weight: 1.0
    registration/rotation_constraint/robust/init_scale: 5.0
    registration/rotation_constraint/robust/min_scale: 2.5
    registration/rotation_constraint/robust/default_scale: 5.0

    registration/genz/planarity_threshold: 0.2

    # Optimizer for the LIO 15-DOF update loop (mirrors the LO solver options).
    # GN: damped solve only (fastest).
    # LM / DOGLEG: step acceptance on the combined ICP+IMU cost, costing one extra
    #   error-evaluation pass per trial step.
    registration/optimization_method: GN  # GN, LM, DOGLEG
    registration/gn/lambda: 1.0e-3
    registration/lm/max_inner_iterations: 5
    registration/lm/lambda_factor: 2.0
    registration/lm/init_lambda: 1.0
    registration/lm/max_lambda: 1.0e+3
    registration/lm/min_lambda: 1.0e-3
    registration/dogleg/initial_trust_region_radius: 2.0
    registration/dogleg/max_trust_region_radius: 10.0
    registration/dogleg/min_trust_region_radius: 1.0e-3
    registration/dogleg/eta1: 0.25
    registration/dogleg/eta2: 0.75
    registration/dogleg/gamma_decrease: 0.80
    registration/dogleg/gamma_increase: 1.25

    registration/degenerate_regularization/type: "NONE" # NONE, NL_REG
    registration/degenerate_regularization/nl_reg/trans_eigenvalue_threshold: 10.0
    registration/degenerate_regularization/nl_reg/rot_eigenvalue_threshold: 10.0
    registration/degenerate_regularization/nl_reg/base_factor: 0.2
    registration/verbose: false

    # Visualization
    vis/covariance_markers/scan/topic_name: "sycl_lo/scan_covariance_markers"
    vis/covariance_markers/scan/marker_ns: "covariance_ellipsoids"
    vis/covariance_markers/scan/scale_factor: 0.5
    vis/covariance_markers/scan/min_scale: 0.0
    vis/covariance_markers/scan/max_scale: 1.0
    vis/covariance_markers/scan/alpha: 0.2
    vis/covariance_markers/scan/color_by_planarity: false
    vis/covariance_markers/scan/default_r: 0.0
    vis/covariance_markers/scan/default_g: 1.0
    vis/covariance_markers/scan/default_b: 0.2
